[package]
name = "mtg-kernel"
version = "0.0.4"
edition.workspace = true

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"

[features]
# PERFORMANCE-ONLY instrumentation for examples/bench_kernel.rs (section 5,
# allocator profile): installs a counting global allocator wrapping the
# system allocator. Off by default; no effect on any normal build/test.
count_allocs = []

[build-dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
