name: CI

'on':
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  rust-quality:
    name: Rust formatting and lint
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Report pinned toolchain
        run: rustc --version --verbose

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --release --locked --workspace --all-targets -- -D warnings

      - name: Run non-Windows native Store feature Clippy
        run: cargo clippy --release --locked -p mtg-kernel --all-targets --features native-training-store-v2-production -- -D warnings

  cross-platform-tests:
    name: Tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            kernel_bin: target/release/kernel_rl_env
          - os: windows-2025
            kernel_bin: target/release/kernel_rl_env.exe
    runs-on: ${{ matrix.os }}
    env:
      MTG_KERNEL_RL_ENV_BIN: ${{ github.workspace }}/${{ matrix.kernel_bin }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up pinned Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version-file: .python-version

      - name: Install locked Python environment
        run: |
          python -m pip install --disable-pip-version-check uv==0.11.29
          uv sync --locked --extra test

      - name: Run Rust release tests
        run: cargo test --release --locked --workspace --all-targets

      - name: Validate native Store production feature boundary
        run: |
          cargo test --release --locked -p mtg-kernel --features native-training-store-v2-production --lib native_store_production_capture_v2::
          cargo test --release --locked -p mtg-kernel --features native-training-store-v2-production --test native_cli_platform_stub_v2

      - name: Validate canonical Pauper manifests
        run: uv run --no-sync python python/tools/generate_pauper_manifests.py --check --repo-root .

      - name: Build release JSONL environment
        run: cargo build --release --locked --bin kernel_rl_env

      - name: Run Python tests against the real Rust environment
        run: uv run --no-sync python -m unittest discover -s python/tests -v
